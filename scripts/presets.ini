# =============================================================================
# ULLAMA MODEL PRESETS
# =============================================================================
# Configuration presets for llama.cpp model servers.
# Organized by provider/model family.
#
# Parameter Reference:
#   hf                  - HuggingFace model repo and quantization variant
#   ctx-size            - Maximum context window size (tokens)
#   n-gpu-layers        - Layers to offload to GPU (99/999 = all)
#   n-cpu-moe           - CPU layers for MoE expert routing
#   cache-type-k/v      - KV cache quantization (q8_0, q4_0, bf16, f16)
#   batch-size          - Physical batch size for prompt processing
#   ubatch-size         - Logical batch size (sequence parallelism)
#   threads             - CPU threads for non-GPU layers
#   threads-batch       - CPU threads for batch processing
#   temp                - Sampling temperature (higher = more random)
#   top-p               - Nucleus sampling threshold
#   top-k               - Top-K sampling (0 = disabled)
#   min-p               - Minimum probability threshold
#   presence-penalty    - Penalize repeated tokens (promotes diversity)
#   repeat-penalty      - Penalize exact repetition
#   fit                 - Auto-fit model to GPU memory (on/off)
#   flash-attn          - Flash attention for speed (on/off)
#   jinja               - Use Jinja templating for chat (true/false)
#   chat-template-kwargs- JSON args for chat template
# =============================================================================

# =============================================================================
# DEFAULT SETTINGS (Global)
# =============================================================================
[DEFAULT]
port = 8001
seed = 3407
flash-attn = on
jinja = true
threads = 8
threads-batch = 16
batch-size = 4096
ubatch-size = 4096
cache-type-k = q8_0
cache-type-v = q8_0
fit = on
temp = 0.6
top-p = 0.95
min-p = 0.01
top-k = 40

# =============================================================================
# QWEN MODELS (Alibaba)
# =============================================================================
# Qwen3.5 series - High-performance coding and general models

# --- Qwen3.5-122B-A10B (MoE, 122B total, 10B active) ---
# Multiple context size variants for different use cases

# 65K context - Balanced performance and memory
[unsloth/Qwen3.5-122B-A10B:UD-Q4_K_XL:ctx65536]
hf = unsloth/Qwen3.5-122B-A10B-GGUF:UD-Q4_K_XL
ctx-size = 65536
batch-size = 2048
ubatch-size = 2048
min-p = 0.00
presence-penalty = 0.05
repeat-penalty = 1.05
top-k = 20

# 131K context - Extended context window
[unsloth/Qwen3.5-122B-A10B:UD-Q4_K_XL:ctx131072]
hf = unsloth/Qwen3.5-122B-A10B-GGUF:UD-Q4_K_XL
ctx-size = 131072
min-p = 0.00
presence-penalty = 1.1
repeat-penalty = 1.05
top-k = 20

# 262K context - Maximum context (uses Q3 for memory)
[unsloth/Qwen3.5-122B-A10B:UD-Q3_K_XL:ctx262144]
hf = unsloth/Qwen3.5-122B-A10B-GGUF:UD-Q3_K_XL
ctx-size = 262144
min-p = 0.00
presence-penalty = 1.1
repeat-penalty = 1.05
top-k = 20

# --- Qwen3.5-35B-A3B (MoE, 35B total, 3B active) ---
# Uses bf16 cache for MoE routing precision
[unsloth/Qwen3.5-35B-A3B]
hf = unsloth/Qwen3.5-35B-A3B-GGUF:UD-Q4_K_XL
ctx-size = 131072
cache-type-k = bf16
cache-type-v = bf16
min-p = 0.00
presence-penalty = 1.1
repeat-penalty = 1.05
top-k = 20

# --- Qwen3.5-27B (Dense) ---
[unsloth/Qwen3.5-27B]
hf = unsloth/Qwen3.5-27B-GGUF:UD-Q4_K_XL
ctx-size = 131072
min-p = 0.00
presence-penalty = 1.1
repeat-penalty = 1.05
top-k = 20

# --- Qwen3.5-9B (Dense) ---
# Smallest Qwen3.5 - uses Q8 for quality
[unsloth/Qwen3.5-9B]
hf = unsloth/Qwen3.5-9B-GGUF:UD-Q8_K_XL
ctx-size = 131072
min-p = 0.00
presence-penalty = 0.05
repeat-penalty = 1.05
