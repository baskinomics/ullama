# =============================================================================
# ULLAMA MODEL PRESETS (macOS / Apple Silicon)
# =============================================================================
# Configuration presets for llama.cpp model servers on macOS.
# Optimized for Apple Silicon (M1/M2/M3) with Metal GPU acceleration.
#
# macOS-Specific Notes:
#   - Uses Metal API for GPU acceleration (no CUDA)
#   - n-gpu-layers = 999 ensures full GPU offload
#   - Unified memory allows larger models than discrete GPU VRAM limits
#   - mlock = true prevents memory pressure issues
#
# Parameter Reference:
#   hf                  - HuggingFace model repo and quantization variant
#   ctx-size            - Maximum context window size (tokens)
#   n-gpu-layers        - Layers to offload to GPU (999 = all for Metal)
#   cache-type-k/v      - KV cache quantization (q8_0, q4_0, f16)
#   batch-size          - Physical batch size for prompt processing
#   ubatch-size         - Logical batch size (sequence parallelism)
#   threads             - CPU threads for non-GPU layers
#   temp                - Sampling temperature (higher = more random)
#   top-p               - Nucleus sampling threshold
#   top-k               - Top-K sampling (0 = disabled)
#   min-p               - Minimum probability threshold
#   mlock               - Lock model in memory (prevents swapping)
#   fit                 - Auto-fit model to GPU memory (on/off)
#   flash-attn          - Flash attention for speed (on/off)
#   jinja               - Use Jinja templating for chat (true/false)
# =============================================================================

# =============================================================================
# DEFAULT SETTINGS (macOS Global)
# =============================================================================
[DEFAULT]
port = 8001
seed = 3407
flash-attn = on
jinja = true
# Full GPU offload for Apple Silicon (Metal)
n-gpu-layers = 999
fit = on
temp = 0.6
top-p = 0.95
min-p = 0.01
top-k = 40

# =============================================================================
# MINIMAX MODELS
# =============================================================================

# --- MiniMax-M2.5 (MoE) ---
# Larger MoE model with optimized batch settings
# Uses mlock to prevent memory pressure on macOS
[unsloth/MiniMax-M2.5]
hf = unsloth/MiniMax-M2.5-GGUF:UD-IQ3_XXS
ctx-size = 32768
fit = off
mlock = true
n-gpu-layers = 99
threads = 12
batch-size = 2048
ubatch-size = 512
cache-type-k = q8_0
cache-type-v = q8_0
temp = 1.0

# --- MiniMax-M2.1 (MoE) ---
# Smaller MoE variant with 16K context
[unsloth/MiniMax-M2.1]
hf = unsloth/MiniMax-M2.1-GGUF:IQ3_XXS
ctx-size = 16384
temp = 1.0

# =============================================================================
# GLM MODELS (Zhipu AI)
# =============================================================================

# --- GLM-4.7-Flash-REAP (23B-A3B MoE) ---
# Extended 131K context for long-document processing
# Q5_K_XL quantization balances quality and memory on macOS
[unsloth/GLM-4.7-Flash-REAP]
hf = unsloth/GLM-4.7-Flash-REAP-23B-A3B-GGUF:Q5_K_XL
ctx-size = 131072
temp = 0.7
top-p = 1.00
