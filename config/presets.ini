; =============================================================================
; ULLAMA MODEL PRESETS
; =============================================================================
; Configuration presets for llama.cpp model servers.
; Organized by provider/model family.
; See: https://github.com/ggml-org/llama.cpp/tree/master/tools/server#model-presets
;
; Parameter Reference:
;   hf                  - HuggingFace model repo and quantization variant
;   ctx-size            - Maximum context window size (tokens)
;   n-gpu-layers        - Layers to offload to GPU (99/999 = all)
;   n-cpu-moe           - CPU layers for MoE expert routing
;   cache-type-k/v      - KV cache quantization (q8_0, q4_0, bf16, f16)
;   batch-size          - Physical batch size for prompt processing
;   ubatch-size         - Logical batch size (sequence parallelism)
;   threads             - CPU threads for non-GPU layers
;   threads-batch       - CPU threads for batch processing
;   temp                - Sampling temperature (higher = more random)
;   top-p               - Nucleus sampling threshold
;   top-k               - Top-K sampling (0 = disabled)
;   min-p               - Minimum probability threshold
;   presence-penalty    - Penalize repeated tokens (promotes diversity)
;   repeat-penalty      - Penalize exact repetition
;   fit                 - Auto-fit model to GPU memory (on/off)
;   flash-attn          - Flash attention for speed (on/off)
;   jinja               - Use Jinja templating for chat (true/false)
;   chat-template-kwargs- JSON args for chat template
; =============================================================================

; =============================================================================
; DEFAULT SETTINGS (Global)
; =============================================================================
[*]
seed = 3407
fit = on
flash-attn = on
threads = 8
threads-batch = 16
jinja = true

; =============================================================================
; QWEN MODELS (Alibaba)
