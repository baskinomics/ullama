services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    environment:
      - OLLAMA_BASE_URL=http://jupiter.hl:11434
      - ENABLE_EVALUATION_ARENA_MODELS=False
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data

volumes:
  ollama:
  open-webui: